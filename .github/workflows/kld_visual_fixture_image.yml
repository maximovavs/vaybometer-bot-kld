name: KLD Visual Fixture Image

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch/ref to test"
        required: true
        default: "main"
        type: string
      scenario:
        description: "Synthetic visual scenario"
        required: true
        default: "drizzle"
        type: choice
        options:
          - cloudy
          - drizzle
          - rain
          - storm
          - new_moon
          - full_moon
      post_type:
        description: "FORMAT_V2 post type"
        required: true
        default: "evening"
        type: choice
        options:
          - evening
          - morning
      generate_image:
        description: "Generate local image file"
        required: false
        default: false
        type: boolean
      send_image_to_test:
        description: "Generate and send image to CHANNEL_ID_TEST only"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: kld-visual-fixture-image
  cancel-in-progress: false

env:
  TELEGRAM_TOKEN_KLG: ${{ secrets.TELEGRAM_TOKEN_KLG }}
  CHANNEL_ID_TEST: ${{ secrets.CHANNEL_ID_TEST }}
  TZ: Europe/Kaliningrad
  VAYBOMETER_CACHE_DIR: ".cache"

jobs:
  fixture-image:
    name: Build/send KLD visual fixture
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile visual modules
        run: |
          python -m py_compile image_prompt_kld.py image_prompt_kld_morning.py visual_context_kld.py visual_rules.py tools/kld_visual_fixture_image.py

      - name: Run fixture prompt / image test
        shell: bash
        run: |
          set -euo pipefail

          args=("tools/kld_visual_fixture_image.py" "--scenario" "${{ inputs.scenario }}" "--post-type" "${{ inputs.post_type }}")

          if [ "${{ inputs.send_image_to_test }}" = "true" ]; then
            args+=("--send-to-test")
          elif [ "${{ inputs.generate_image }}" = "true" ]; then
            args+=("--generate")
          fi

          echo "Running: python ${args[*]}"
          python "${args[@]}"
