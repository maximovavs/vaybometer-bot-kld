name: Daily VayboMeter (KLD)

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 15 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      run_morning:
        description: "Запустить утренний пост"
        type: boolean
        default: false
        required: false
      run_evening:
        description: "Запустить вечерний пост"
        type: boolean
        default: true
        required: false
      run_noon_fx:
        description: "Запустить пост только с курсами"
        type: boolean
        default: false
        required: false
      format_v2:
        description: "FORMAT_V2 для ручного теста/override; расписание morning/evening уже включает V2"
        type: boolean
        default: false
        required: false
      work_date:
        description: "Переопределить дату (YYYY-MM-DD)"
        required: false
      to_test:
        description: "Публиковать в тестовый канал?"
        type: boolean
        default: false
        required: false
      channel_override:
        description: "Явный chat_id канала (перебивает параметры выше)"
        required: false

permissions:
  contents: read

concurrency:
  group: daily-post-kld-${{ github.workflow }}-${{ github.job }}
  cancel-in-progress: false

env:
  TELEGRAM_TOKEN_KLG:  ${{ secrets.TELEGRAM_TOKEN_KLG }}
  CHANNEL_ID_KLG:      ${{ secrets.CHANNEL_ID_KLG }}
  CHANNEL_ID_TEST:     ${{ secrets.CHANNEL_ID_TEST }}
  CHANNEL_ID_OVERRIDE: ${{ github.event.inputs.channel_override }}
  TZ: Europe/Kaliningrad
  WORK_DATE: ${{ github.event.inputs.work_date }}
  DISABLE_LLM_DAILY: "0"
  DEBUG_WATER: "0"
  GEN_SKIP_SHORT: "1"
  PYTHONUNBUFFERED: "1"
  FORMAT_V2: ${{ github.event.inputs.format_v2 == 'true' && '1' || '0' }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
  TO_TEST: ${{ github.event.inputs.to_test }}

jobs:
  morning:
    name: Morning post (for today)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 5 * * *') ||
      (github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.run_morning))
    env:
      POST_MODE: "morning"
      DAY_OFFSET: "0"
      ASTRO_OFFSET: "0"
      SHOW_AIR: "1"
      SHOW_SPACE: "1"
      SHOW_SCHUMANN: "1"
      DISABLE_SCHUMANN: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Post morning (for today)
        shell: bash
        run: |
          python <<'PY'
          import os, runpy, sys, pendulum
          print("Morning post (for today)")
          wd = os.getenv("WORK_DATE")
          if wd:
              def _fake_today(tz=None):
                  dt = pendulum.parse(wd)
                  return dt.in_tz(tz) if tz else dt
              pendulum.today = _fake_today
          scheduled_run = (os.getenv("GITHUB_EVENT_NAME") == "schedule")
          format_v2 = scheduled_run or (os.getenv("FORMAT_V2", "").strip().lower() in ("1", "true", "yes", "on"))
          to_test = os.getenv("TO_TEST", "").strip().lower() in ("1", "true", "yes", "on")
          chat_override = (os.getenv("CHANNEL_ID_OVERRIDE") or "").strip()
          production_chat = (os.getenv("CHANNEL_ID_KLG") or "").strip()
          if format_v2:
              args = ["safe_test_post.py", "--mode", "morning", "--format-v2"]
              if wd:
                  args += ["--date", wd]
              if chat_override:
                  args += ["--chat-id", chat_override, "--send", "--no-test-label"]
              elif to_test:
                  args += ["--to-test", "--send"]
              elif scheduled_run and production_chat:
                  args += ["--chat-id", production_chat, "--send", "--no-test-label"]
              else:
                  print("FORMAT_V2 включён без to_test/channel_override: выполняю dry-run без отправки.")
              sys.argv = args
              runpy.run_path("safe_test_post.py", run_name="__main__")
              raise SystemExit(0)
          args = ["post_kld.py", "--mode", "morning"]
          if chat_override:
              args += ["--chat-id", chat_override]
          elif to_test:
              args.append("--to-test")
          sys.argv = args
          runpy.run_path("post_kld.py", run_name="__main__")
          PY

  evening:
    name: Evening post (for tomorrow)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 15 * * *') ||
      (github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.run_evening))
    env:
      POST_MODE: "evening"
      DAY_OFFSET: "1"
      ASTRO_OFFSET: "1"
      SHOW_AIR: "0"
      SHOW_SPACE: "0"
      SHOW_SCHUMANN: "0"
      DISABLE_SCHUMANN: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Post evening (announce tomorrow)
        shell: bash
        run: |
          python <<'PY'
          import os, runpy, sys, pendulum
          print("Evening post (for tomorrow)")
          wd = os.getenv("WORK_DATE")
          if wd:
              def _fake_today(tz=None):
                  dt = pendulum.parse(wd)
                  return dt.in_tz(tz) if tz else dt
              pendulum.today = _fake_today
          scheduled_run = (os.getenv("GITHUB_EVENT_NAME") == "schedule")
          format_v2 = scheduled_run or (os.getenv("FORMAT_V2", "").strip().lower() in ("1", "true", "yes", "on"))
          to_test = os.getenv("TO_TEST","").strip().lower() in ("1","true","yes","on")
          chat_override = os.getenv("CHANNEL_ID_OVERRIDE") or ""
          production_chat = (os.getenv("CHANNEL_ID_KLG") or "").strip()
          if format_v2:
              args = ["safe_test_post.py", "--mode", "evening", "--format-v2"]
              if wd:
                  args += ["--date", wd]
              if chat_override.strip():
                  args += ["--chat-id", chat_override.strip(), "--send", "--no-test-label"]
              elif to_test:
                  args += ["--to-test", "--send"]
              elif scheduled_run and production_chat:
                  args += ["--chat-id", production_chat, "--send", "--no-test-label"]
              else:
                  print("FORMAT_V2 включён без to_test/channel_override: выполняю dry-run без отправки.")
              sys.argv = args
              runpy.run_path("safe_test_post.py", run_name="__main__")
              raise SystemExit(0)
          args = ["post_kld.py", "--mode", "evening"]
          if chat_override.strip():
              args += ["--chat-id", chat_override.strip()]
          elif to_test:
              args.append("--to-test")
          sys.argv = args
          runpy.run_path("post_kld.py", run_name="__main__")
          PY

  noon_fx:
    name: Noon FX only (12:00 MSK)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 9 * * *') ||
      (github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.run_noon_fx))
    env:
      DISABLE_LLM_DAILY: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Post FX only (12:00 MSK)
        shell: bash
        run: |
          python <<'PY'
          import os, runpy, sys, pendulum
          wd = os.getenv("WORK_DATE")
          if wd:
              def _fake_today(tz=None):
                  dt = pendulum.parse(wd)
                  return dt.in_tz(tz) if tz else dt
              pendulum.today = _fake_today
          args = ["post_kld.py", "--fx-only"]
          chat_override = os.getenv("CHANNEL_ID_OVERRIDE") or ""
          if chat_override.strip():
              args += ["--chat-id", chat_override.strip()]
          else:
              to_test = os.getenv("TO_TEST","").strip().lower() in ("1","true","yes","on")
              if to_test:
                  args.append("--to-test")
          sys.argv = args
          runpy.run_path("post_kld.py", run_name="__main__")
          PY
