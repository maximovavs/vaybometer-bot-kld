name: Publish KLD Morning Pipeline

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/codex_publish_morning.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Apply verified morning pipeline code
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://filebin.net/codex-kld-20260619/publish-morning.tar.gz -o /tmp/publish-morning.tar.gz
          test "$(sha256sum /tmp/publish-morning.tar.gz | cut -d' ' -f1)" = "3a40f6cef9e62dab6af95405855db6006d3d33ecb56280f98b2edab1d9c48404"
          mkdir -p /tmp/publish-morning
          tar -xzf /tmp/publish-morning.tar.gz -C /tmp/publish-morning
          cp /tmp/publish-morning/image_prompt_kld_morning.py image_prompt_kld_morning.py
          cp /tmp/publish-morning/visual_rules.py visual_rules.py
          cp /tmp/publish-morning/tools/test_visual_kld.py tools/test_visual_kld.py
          cp /tmp/publish-morning/tools/kld_visual_fixture_image.py tools/kld_visual_fixture_image.py
          python -m py_compile visual_rules.py image_prompt_kld_morning.py tools/test_visual_kld.py tools/kld_visual_fixture_image.py
          python tools/test_visual_kld.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add image_prompt_kld_morning.py visual_rules.py tools/test_visual_kld.py tools/kld_visual_fixture_image.py
          git commit -m "Add KLD morning image pipeline"
          git push origin HEAD:main
