name: Safe Test Post (Kaliningrad)

on:
  workflow_dispatch:
    inputs:
      test_branch:
        description: "Branch with safe test code"
        default: main
        required: true
      mode:
        description: "Post mode"
        type: choice
        options:
          - morning
          - evening
        default: evening
        required: true
      format_v2:
        description: "Use scenario-style FORMAT_V2"
        type: boolean
        default: false
        required: false
      feels_like:
        description: "Test extra morning line: feels-like / comfort"
        type: boolean
        default: false
        required: false
      best_window:
        description: "Test extra morning line: best window of the day"
        type: boolean
        default: false
        required: false
      smart_plan:
        description: "Test stronger morning recommendations for UV/wind/rain"
        type: boolean
        default: false
        required: false
      vaybometer_score:
        description: "Test extra morning/evening line: VayboMeter score"
        type: boolean
        default: false
        required: false
      work_date:
        description: "Optional date override (YYYY-MM-DD)"
        required: false
      send_to_test:
        description: "Send to CHANNEL_ID_TEST? If false, logs only."
        type: boolean
        default: false
        required: false
      for_tomorrow:
        description: "Shift base date by +1 day"
        type: boolean
        default: false
        required: false

permissions:
  contents: read

concurrency:
  group: safe-test-post-kld
  cancel-in-progress: false

env:
  TELEGRAM_TOKEN_KLG: ${{ secrets.TELEGRAM_TOKEN_KLG }}
  CHANNEL_ID_TEST: ${{ secrets.CHANNEL_ID_TEST }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  OWM_KEY: ${{ secrets.OWM_KEY }}
  POLLINATIONS_TOKEN: ${{ secrets.POLLINATIONS_TOKEN }}
  TZ: Europe/Kaliningrad
  VAYBOMETER_CACHE_DIR: ".cache"
  KLD_IMG_ENABLED: "0"
  DISABLE_SCHUMANN: "1"
  FORMAT_V2: ${{ github.event.inputs.format_v2 == 'true' && '1' || '0' }}
  MORNING_FEELS_LIKE: ${{ github.event.inputs.feels_like == 'true' && '1' || '0' }}
  MORNING_BEST_WINDOW: ${{ github.event.inputs.best_window == 'true' && '1' || '0' }}
  MORNING_SMART_PLAN: ${{ github.event.inputs.smart_plan == 'true' && '1' || '0' }}
  MORNING_VAYBOMETER_SCORE: ${{ github.event.inputs.vaybometer_score == 'true' && '1' || '0' }}
  EVENING_VAYBOMETER_SCORE: ${{ github.event.inputs.vaybometer_score == 'true' && '1' || '0' }}
  FORMAT_V2_POLISH: "1"
  FORMAT_V2_SCORE_CONCLUSION: "1"
  FORMAT_V2_SENSOR_LINE: "1"

jobs:
  safe_test:
    name: Build sanitized test post
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.test_branch }}

      - name: Restore .cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: kld-safe-test-cache-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            kld-safe-test-cache-${{ runner.os }}-

      - name: Time debug
        run: |
          echo "UTC:         $(date -u)"
          echo "Kaliningrad: $(TZ=Europe/Kaliningrad date)"
          echo "Branch: ${{ github.event.inputs.test_branch }}"
          echo "FORMAT_V2: $FORMAT_V2"
          echo "MORNING_FEELS_LIKE: $MORNING_FEELS_LIKE"
          echo "MORNING_BEST_WINDOW: $MORNING_BEST_WINDOW"
          echo "MORNING_SMART_PLAN: $MORNING_SMART_PLAN"
          echo "MORNING_VAYBOMETER_SCORE: $MORNING_VAYBOMETER_SCORE"
          echo "EVENING_VAYBOMETER_SCORE: $EVENING_VAYBOMETER_SCORE"
          echo "FORMAT_V2_POLISH: $FORMAT_V2_POLISH"
          echo "FORMAT_V2_SCORE_CONCLUSION: $FORMAT_V2_SCORE_CONCLUSION"
          echo "FORMAT_V2_SENSOR_LINE: $FORMAT_V2_SENSOR_LINE"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build / optionally send safe test post
        shell: bash
        run: |
          set -euo pipefail
          args=("safe_test_post.py" "--mode" "${{ github.event.inputs.mode }}")

          if [ "${{ github.event.inputs.format_v2 }}" = "true" ]; then
            args+=("--format-v2")
          fi

          if [ -n "${{ github.event.inputs.work_date }}" ]; then
            args+=("--date" "${{ github.event.inputs.work_date }}")
          fi

          if [ "${{ github.event.inputs.for_tomorrow }}" = "true" ]; then
            args+=("--for-tomorrow")
          fi

          if [ "${{ github.event.inputs.send_to_test }}" = "true" ]; then
            args+=("--to-test" "--send")
          fi

          echo "Running: python ${args[*]}"
          python "${args[@]}"
