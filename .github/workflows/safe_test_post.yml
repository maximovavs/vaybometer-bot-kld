name: Safe Test Post (Kaliningrad)

on:
  workflow_dispatch:
    inputs:
      test_branch:
        description: "Branch with safe test code"
        default: main
        required: true
      mode:
        description: "Post mode"
        type: choice
        options:
          - morning
          - evening
        default: evening
        required: true
      format_v2:
        description: "Use scenario-style FORMAT_V2"
        type: boolean
        default: false
        required: false
      visual_prompt_probe:
        description: "Print VISUAL_CONTEXT / VISUAL_CUES / VISUAL_PROMPT for image matrix"
        type: boolean
        default: true
        required: false
      compact:
        description: "Test compact FORMAT_V2 output"
        type: boolean
        default: false
        required: false
      morning_spacing:
        description: "Add visual blank lines to morning FORMAT_V2 output"
        type: boolean
        default: true
        required: false
      windsport_polish:
        description: "Cautious wording for kite/wing/wind when sea conditions are mixed"
        type: boolean
        default: true
        required: false
      synthetic_bad_weather:
        description: "Run synthetic cold rain/wind sea scenario for water-sport safety"
        type: boolean
        default: false
        required: false
      feels_like:
        description: "Test extra morning line: feels-like / comfort"
        type: boolean
        default: false
        required: false
      best_window:
        description: "Test extra morning line: best window of the day"
        type: boolean
        default: false
        required: false
      smart_plan:
        description: "Test stronger morning recommendations for UV/wind/rain"
        type: boolean
        default: false
        required: false
      vaybometer_score:
        description: "Test extra morning/evening line: VayboMeter score"
        type: boolean
        default: false
        required: false
      work_date:
        description: "Optional date override (YYYY-MM-DD)"
        required: false
      send_to_test:
        description: "Send to CHANNEL_ID_TEST? If false, logs only."
        type: boolean
        default: false
        required: false
      for_tomorrow:
        description: "Shift base date by +1 day"
        type: boolean
        default: false
        required: false

permissions:
  contents: read

concurrency:
  group: safe-test-post-kld
  cancel-in-progress: false

env:
  TELEGRAM_TOKEN_KLG: ${{ secrets.TELEGRAM_TOKEN_KLG }}
  CHANNEL_ID_TEST: ${{ secrets.CHANNEL_ID_TEST }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  OWM_KEY: ${{ secrets.OWM_KEY }}
  POLLINATIONS_TOKEN: ${{ secrets.POLLINATIONS_TOKEN }}
  TZ: Europe/Kaliningrad
  VAYBOMETER_CACHE_DIR: ".cache"
  KLD_IMG_ENABLED: "0"
  DISABLE_SCHUMANN: "1"
  FORMAT_V2: ${{ github.event.inputs.format_v2 == 'true' && '1' || '0' }}
  FORMAT_V2_VISUAL_PROMPT_PROBE: ${{ github.event.inputs.visual_prompt_probe == 'true' && '1' || '0' }}
  FORMAT_V2_COMPACT: ${{ github.event.inputs.compact == 'true' && '1' || '0' }}
  FORMAT_V2_MORNING_SPACING: ${{ github.event.inputs.morning_spacing == 'true' && '1' || '0' }}
  FORMAT_V2_WINDSPORT_POLISH: ${{ github.event.inputs.windsport_polish == 'true' && '1' || '0' }}
  KLD_SYNTHETIC_BAD_WEATHER: ${{ github.event.inputs.synthetic_bad_weather == 'true' && '1' || '0' }}
  MORNING_FEELS_LIKE: ${{ github.event.inputs.feels_like == 'true' && '1' || '0' }}
  MORNING_BEST_WINDOW: ${{ github.event.inputs.best_window == 'true' && '1' || '0' }}
  MORNING_SMART_PLAN: ${{ github.event.inputs.smart_plan == 'true' && '1' || '0' }}
  MORNING_VAYBOMETER_SCORE: ${{ (github.event.inputs.vaybometer_score == 'true' || github.event.inputs.compact == 'true') && '1' || '0' }}
  EVENING_VAYBOMETER_SCORE: ${{ (github.event.inputs.vaybometer_score == 'true' || github.event.inputs.compact == 'true') && '1' || '0' }}
  FORMAT_V2_POLISH: "1"
  FORMAT_V2_SCORE_CONCLUSION: "1"
  FORMAT_V2_REASON_CONCLUSION: "1"
  FORMAT_V2_MAIN_NUANCE: "1"
  FORMAT_V2_ASTRO_CLEANUP: "1"
  FORMAT_V2_CONFIDENCE_POLISH: "1"
  FORMAT_V2_SENSOR_LINE: "1"

jobs:
  safe_test:
    name: Build sanitized test post
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.test_branch }}

      - name: Restore .cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: kld-safe-test-cache-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            kld-safe-test-cache-${{ runner.os }}-

      - name: Time debug
        run: |
          echo "UTC:         $(date -u)"
          echo "Kaliningrad: $(TZ=Europe/Kaliningrad date)"
          echo "Branch: ${{ github.event.inputs.test_branch }}"
          echo "FORMAT_V2: $FORMAT_V2"
          echo "FORMAT_V2_VISUAL_PROMPT_PROBE: $FORMAT_V2_VISUAL_PROMPT_PROBE"
          echo "FORMAT_V2_COMPACT: $FORMAT_V2_COMPACT"
          echo "FORMAT_V2_MORNING_SPACING: $FORMAT_V2_MORNING_SPACING"
          echo "FORMAT_V2_WINDSPORT_POLISH: $FORMAT_V2_WINDSPORT_POLISH"
          echo "KLD_SYNTHETIC_BAD_WEATHER: $KLD_SYNTHETIC_BAD_WEATHER"
          echo "MORNING_FEELS_LIKE: $MORNING_FEELS_LIKE"
          echo "MORNING_BEST_WINDOW: $MORNING_BEST_WINDOW"
          echo "MORNING_SMART_PLAN: $MORNING_SMART_PLAN"
          echo "MORNING_VAYBOMETER_SCORE: $MORNING_VAYBOMETER_SCORE"
          echo "EVENING_VAYBOMETER_SCORE: $EVENING_VAYBOMETER_SCORE"
          echo "FORMAT_V2_POLISH: $FORMAT_V2_POLISH"
          echo "FORMAT_V2_SCORE_CONCLUSION: $FORMAT_V2_SCORE_CONCLUSION"
          echo "FORMAT_V2_REASON_CONCLUSION: $FORMAT_V2_REASON_CONCLUSION"
          echo "FORMAT_V2_MAIN_NUANCE: $FORMAT_V2_MAIN_NUANCE"
          echo "FORMAT_V2_ASTRO_CLEANUP: $FORMAT_V2_ASTRO_CLEANUP"
          echo "FORMAT_V2_CONFIDENCE_POLISH: $FORMAT_V2_CONFIDENCE_POLISH"
          echo "FORMAT_V2_SENSOR_LINE: $FORMAT_V2_SENSOR_LINE"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build / optionally send safe test post
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event.inputs.synthetic_bad_weather }}" = "true" ]; then
            echo "Running synthetic bad-weather fixture"
            python synthetic_badweather_test.py
            exit 0
          fi

          args=("safe_test_post.py" "--mode" "${{ github.event.inputs.mode }}")

          if [ "${{ github.event.inputs.format_v2 }}" = "true" ]; then
            args+=("--format-v2")
          fi

          if [ -n "${{ github.event.inputs.work_date }}" ]; then
            args+=("--date" "${{ github.event.inputs.work_date }}")
          fi

          if [ "${{ github.event.inputs.for_tomorrow }}" = "true" ]; then
            args+=("--for-tomorrow")
          fi

          if [ "${{ github.event.inputs.send_to_test }}" = "true" ]; then
            args+=("--to-test" "--send")
          fi

          echo "Running: python ${args[*]}"
          python "${args[@]}" | tee safe_test_post_output.log

          if [ "${{ github.event.inputs.visual_prompt_probe }}" = "true" ] && [ "${{ github.event.inputs.format_v2 }}" = "true" ]; then
            python - <<'PY'
          from pathlib import Path

          log = Path("safe_test_post_output.log").read_text(encoding="utf-8")
          start = "===== FORMAT_V2 MESSAGE BEGIN ====="
          end = "===== FORMAT_V2 MESSAGE END ====="
          if start not in log or end not in log:
              raise SystemExit("FORMAT_V2 MESSAGE block not found in safe_test_post output")
          block = log.split(start)[-1].split(end)[0].strip()
          Path("format_v2_message.txt").write_text(block + "\n", encoding="utf-8")
          print("Extracted already-built FORMAT_V2 message to format_v2_message.txt")
          PY

            echo "Running visual prompt parser on already-built FORMAT_V2 text"
            python visual_rules.py --message-file format_v2_message.txt --post-type "${{ github.event.inputs.mode }}" --prompt

            echo "Running image prompt bridge on already-built FORMAT_V2 text"
            python - <<'PY'
          import datetime as dt
          import os
          from pathlib import Path
          from image_prompt_kld import build_kld_evening_prompt

          message = Path("format_v2_message.txt").read_text(encoding="utf-8")
          work_date = os.getenv("WORK_DATE") or ""
          if work_date:
              try:
                  date_value = dt.date.fromisoformat(work_date)
              except Exception:
                  date_value = dt.date.today()
          else:
              date_value = dt.date.today()

          prompt, style_name = build_kld_evening_prompt(
              date=date_value,
              marine_mood="",
              inland_mood="",
              final_format_v2_message=message,
              post_type="${{ github.event.inputs.mode }}",
          )
          print("\n===== KLD_IMAGE_PROMPT_STYLE BEGIN =====\n")
          print(style_name)
          print("\n===== KLD_IMAGE_PROMPT_STYLE END =====\n")
          print("\n===== KLD_IMAGE_PROMPT BEGIN =====\n")
          print(prompt)
          print("\n===== KLD_IMAGE_PROMPT END =====\n")
          PY
          else
            echo "Visual prompt probe skipped. Enable format_v2=true and visual_prompt_probe=true."
          fi
