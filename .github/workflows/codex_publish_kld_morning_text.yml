name: Codex publish KLD morning text update

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/codex_publish_kld_morning_text.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download exact change set
        run: |
          curl --fail --silent --show-error --location \
            https://filebin.net/codex-kld-morning-text-20260619/publish-kld-morning-text.zip \
            --output /tmp/publish-kld-morning-text.zip
          echo "f5bf0765051267eec3f690bdb84912f485640cb803f7f004d9dccf0f4857ad9c  /tmp/publish-kld-morning-text.zip" | sha256sum --check --strict
          unzip -o /tmp/publish-kld-morning-text.zip -d /tmp/kld-morning-text
          install -m 0644 /tmp/kld-morning-text/post_common.py post_common.py
          install -m 0644 /tmp/kld-morning-text/format_v2.py format_v2.py
          install -m 0644 /tmp/kld-morning-text/safe_test_post.py safe_test_post.py
          install -m 0644 /tmp/kld-morning-text/tools/test_format_v2_morning_kld.py tools/test_format_v2_morning_kld.py

      - name: Install runtime dependencies
        run: python -m pip install pendulum python-telegram-bot requests pillow

      - name: Verify KLD morning FORMAT_V2
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -m py_compile safe_test_post.py post_common.py format_v2.py tools/test_format_v2_morning_kld.py
          python tools/test_format_v2_morning_kld.py
          python safe_test_post.py --mode morning --format-v2 | tee /tmp/kld-morning-format-v2.log
          python - <<'PY'
          from pathlib import Path
          text = Path('/tmp/kld-morning-format-v2.log').read_text(encoding='utf-8')
          for marker in ('🌇 Закат сегодня:', '💱 Курсы', '☀️ УФ', '🏭 Воздух', '✅ План', 'Safecast'):
              assert marker in text, marker
          PY

      - name: Commit approved files to main
        run: |
          git config user.name "codex[bot]"
          git config user.email "codex[bot]@users.noreply.github.com"
          git add -- post_common.py format_v2.py safe_test_post.py tools/test_format_v2_morning_kld.py
          if git diff --cached --quiet; then
            echo "No code changes to commit"
            exit 0
          fi
          git commit -m "Restore KLD morning FORMAT_V2 utility blocks"
          git push origin HEAD:main
          git rev-parse HEAD
