name: Codex publish KLD morning text update

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/codex_publish_kld_morning_text.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply exact change set
        shell: bash
        run: |
          echo '' | base64 --decode > /tmp/kld-morning-text.patch
          echo 'd0b1c6c185d91bfb7aa12fb837833a3a1e5170c9e596cc890f9070ebc1ab6948  /tmp/kld-morning-test.py' > /tmp/test.sha256
          echo '' | base64 --decode > /tmp/kld-morning-test.py
          echo '88ee12ae9c9bb714259c84f3d29625ef025e0a621740674d8ad42550f35625ef  /tmp/kld-morning-text.patch' | sha256sum --check --strict
          sha256sum --check --strict /tmp/test.sha256
          git apply --whitespace=nowarn /tmp/kld-morning-text.patch
          install -m 0644 /tmp/kld-morning-test.py tools/test_format_v2_morning_kld.py

      - name: Install runtime dependencies
        run: python -m pip install pendulum python-telegram-bot requests pillow

      - name: Verify KLD morning FORMAT_V2
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -m py_compile safe_test_post.py post_common.py format_v2.py tools/test_format_v2_morning_kld.py
          python tools/test_format_v2_morning_kld.py
          python safe_test_post.py --mode morning --format-v2 | tee /tmp/kld-morning-format-v2.log
          python - <<'PY'
          from pathlib import Path
          text = Path('/tmp/kld-morning-format-v2.log').read_text(encoding='utf-8')
          for marker in ('🌇 Закат сегодня:', '💱 Курсы', '☀️ УФ', '🏭 Воздух', '✅ План', 'Safecast'):
              assert marker in text, marker
          PY

      - name: Commit approved files to main
        run: |
          git config user.name "codex[bot]"
          git config user.email "codex[bot]@users.noreply.github.com"
          git add -- post_common.py format_v2.py safe_test_post.py tools/test_format_v2_morning_kld.py
          git commit -m "Restore KLD morning FORMAT_V2 utility blocks"
          git push origin HEAD:main
          git rev-parse HEAD
