name: KLD Visual Smoke Tests

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch/ref to test"
        required: true
        default: "main"
        type: string

permissions:
  contents: read

jobs:
  visual-smoke-tests:
    name: Run KLD visual smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile visual modules
        run: |
          python -m py_compile image_prompt_kld.py visual_context_kld.py visual_rules.py tools/test_visual_kld.py

      - name: Run synthetic KLD visual checks
        run: |
          python tools/test_visual_kld.py
