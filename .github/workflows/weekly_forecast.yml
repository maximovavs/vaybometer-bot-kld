name: Weekly VayboMeter Forecast

on:
  schedule:
    # 22:00 Europe/Kaliningrad.
    - cron: "0 20 * * 6"
  workflow_dispatch:
    inputs:
      date:
        description: "Week start date YYYY-MM-DD, empty = today"
        required: false
        default: ""
      send_to_test:
        description: "Publish weekly forecast to test channel?"
        type: boolean
        required: true
        default: true
      publish_to_prod:
        description: "Publish weekly forecast to production channel?"
        type: boolean
        required: true
        default: false
      channel_override:
        description: "Optional Telegram chat/channel override. If set, send only there."
        required: false
        default: ""
      dry_run:
        description: "Preview only, do not send to Telegram"
        type: boolean
        required: true
        default: true

permissions:
  contents: read

concurrency:
  group: weekly-vaybometer-forecast-kld
  cancel-in-progress: false

env:
  TELEGRAM_TOKEN_KLG: ${{ secrets.TELEGRAM_TOKEN_KLG }}
  CHANNEL_ID_KLG: ${{ secrets.CHANNEL_ID_KLG }}
  CHANNEL_ID_TEST: ${{ secrets.CHANNEL_ID_TEST }}
  CHANNEL_ID_OVERRIDE: ${{ github.event.inputs.channel_override }}
  WEEK_START_DATE: ${{ github.event.inputs.date }}
  SEND_TO_TEST: ${{ github.event.inputs.send_to_test }}
  PUBLISH_TO_PROD: ${{ github.event.inputs.publish_to_prod }}
  DRY_RUN: ${{ github.event.inputs.dry_run }}
  AIRVISUAL_KEY: ${{ secrets.AIRVISUAL_KEY }}
  OWM_KEY: ${{ secrets.OWM_KEY }}
  TZ: Europe/Kaliningrad
  VAYBOMETER_CACHE_DIR: ".cache"

jobs:
  weekly_forecast:
    name: Build / optionally publish weekly forecast
    runs-on: ubuntu-latest
    steps:
      - name: Schedule guard
        id: schedule_guard
        shell: bash
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Scheduled local time: $(TZ="$TZ" date)"
          if [ "$(TZ="$TZ" date +%u)" = "6" ] && [ "$(TZ="$TZ" date +%H)" = "22" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping schedule outside Saturday 22:00 local time."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.schedule_guard.outputs.should_run == 'true'

      - uses: actions/setup-python@v5
        if: steps.schedule_guard.outputs.should_run == 'true'
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.schedule_guard.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build preview / optionally send weekly forecast
        if: steps.schedule_guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            CHANNEL_ID_OVERRIDE=""
            WEEK_START_DATE=""
            SEND_TO_TEST="false"
            PUBLISH_TO_PROD="true"
            DRY_RUN="false"
            echo "Weekly forecast target: scheduled production"
          fi

          args=("send_weekly_forecast.py")
          if [ -n "${WEEK_START_DATE:-}" ]; then
            args+=("--date" "$WEEK_START_DATE")
          fi

          echo "Weekly forecast preview:"
          python "${args[@]}" | tee weekly_forecast_preview.log

          intended=()
          if [ -n "${CHANNEL_ID_OVERRIDE:-}" ]; then
            intended+=("override $CHANNEL_ID_OVERRIDE")
          else
            if [ "${SEND_TO_TEST:-}" = "true" ]; then
              intended+=("test")
            fi
            if [ "${PUBLISH_TO_PROD:-}" = "true" ]; then
              intended+=("production")
            fi
          fi

          if [ "${DRY_RUN:-}" = "true" ]; then
            echo "Weekly forecast target: dry-run"
            if [ "${#intended[@]}" -gt 0 ]; then
              printf 'Dry-run intended target: %s\n' "${intended[@]}"
            else
              echo "Dry-run intended target: none"
            fi
            exit 0
          fi

          targets=()
          labels=()

          add_target() {
            local label="$1"
            local chat_id="$2"
            if [ -z "$chat_id" ]; then
              echo "Telegram destination for $label is empty"
              exit 1
            fi
            for existing in "${targets[@]}"; do
              if [ "$existing" = "$chat_id" ]; then
                echo "Weekly forecast target: $label (same chat as earlier destination; skipping duplicate send)"
                return
              fi
            done
            targets+=("$chat_id")
            labels+=("$label")
          }

          if [ -n "${CHANNEL_ID_OVERRIDE:-}" ]; then
            add_target "override $CHANNEL_ID_OVERRIDE" "$CHANNEL_ID_OVERRIDE"
          else
            if [ "${SEND_TO_TEST:-}" = "true" ]; then
              add_target "test" "$CHANNEL_ID_TEST"
            fi
            if [ "${PUBLISH_TO_PROD:-}" = "true" ]; then
              add_target "production" "$CHANNEL_ID_KLG"
            fi
          fi

          if [ "${#targets[@]}" -eq 0 ]; then
            echo "No Telegram destination selected. Choose test, prod, or channel_override."
            exit 1
          fi

          for i in "${!targets[@]}"; do
            echo "Weekly forecast target: ${labels[$i]}"
            send_args=("${args[@]}" "--send" "--chat-id" "${targets[$i]}")
            python "${send_args[@]}"
          done
