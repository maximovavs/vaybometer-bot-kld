name: Codex publish KLD astro block

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/codex_publish_kld_astro.yml
      - .github/codex_apply_kld_astro.py

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply exact astro patch
        run: |
          python .github/codex_apply_kld_astro.py
          git apply --whitespace=nowarn /tmp/astro-kld.patch
      - name: Install runtime dependencies
        run: python -m pip install pendulum python-telegram-bot requests pillow
      - name: Verify astro block
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -m py_compile post_common.py format_v2.py safe_test_post.py
          python tools/test_format_v2_morning_kld.py
          python safe_test_post.py --mode morning --format-v2 > /tmp/morning.log
          python safe_test_post.py --mode evening --format-v2 > /tmp/evening.log
          grep -q '🌅 <b>Солнце и ритм дня</b>' /tmp/morning.log
          grep -q '💚 В плюсе:' /tmp/morning.log
          grep -q '🌅 <b>Солнце и ритм завтрашнего дня</b>' /tmp/evening.log
          grep -q '💚 В плюсе:' /tmp/evening.log
      - name: Commit approved files
        run: |
          git config user.name 'codex[bot]'
          git config user.email 'codex[bot]@users.noreply.github.com'
          git add -- post_common.py format_v2.py safe_test_post.py tools/test_format_v2_morning_kld.py
          git commit -m 'Improve KLD daily astro block'
          git push origin HEAD:main
          git rev-parse HEAD
